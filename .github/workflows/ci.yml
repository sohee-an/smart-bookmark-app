name: CI

# dev는 직접 push 금지(브랜치 보호 enforce_admins) → 진입은 PR로만.
# 따라서 CI는 PR에서만 돌린다. PR은 up-to-date(strict) 병합 프리뷰를 검증하므로
# 머지 후 재실행(on.push)은 중복이라 두지 않는다.
on:
  pull_request:
    branches:
      - main
      - dev

# 같은 ref에 새 커밋이 push되면 진행 중인 옛 CI run은 취소한다(자원 낭비 방지).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint 검사
        run: pnpm lint
      # FSD 레이어 경계는 결정론적 아키텍처 규칙이라 warn이 아닌 error로 강제 게이트.
      # (일반 lint는 only-warn이라 통과되므로 별도 config로 분리해 막는다.)
      - name: FSD 레이어 경계 검사
        run: pnpm --filter @smart-bookmark/web lint:fsd
      - name: 타입 검사
        run: pnpm typecheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    # 일부 테스트가 모듈 로드 시 Supabase 클라이언트를 생성하므로 placeholder env 필요.
    # (실제 값 아님 — 테스트는 네트워크 호출 없이 mock으로 검증)
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 브라우저(Storybook) 프로젝트 제외한 unit/통합만 — CI에 Playwright 브라우저 미설치
      - name: 테스트 실행 + 커버리지
        run: pnpm --filter @smart-bookmark/web test:coverage
      - name: 커버리지 리포트 PR 코멘트
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: apps/web
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      GEMINI_API_KEY: placeholder-gemini-key
      RESEND_API_KEY: re_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Playwright 브라우저 설치
        run: pnpm --filter @smart-bookmark/web exec playwright install --with-deps chromium
      - name: E2E 테스트 실행
        run: pnpm --filter @smart-bookmark/web test:e2e --project=chromium

  build:
    name: Build
    runs-on: ubuntu-latest
    # 빌드 시 참조되는 env — 실제 값이 아닌 placeholder (빌드는 네트워크 호출 없음).
    # 실제 시크릿은 Vercel 환경변수로 주입되며 CI 빌드엔 불필요.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      GEMINI_API_KEY: placeholder-gemini-key
      RESEND_API_KEY: re_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 빌드
        run: pnpm build
