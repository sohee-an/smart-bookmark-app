name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Lint 검사
        run: pnpm lint
